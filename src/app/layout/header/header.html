<header class="header">
  <div class="header__left">
    <button class="header__menu-btn" (click)="onMenuToggle()" aria-label="Toggle sidebar">
      <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
        <path d="M3 5h14M3 10h14M3 15h14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
    </button>
    <a class="header__title" routerLink="/">Second Brain</a>
  </div>
  <div class="header__center">
    <app-search-bar />
  </div>
  <div class="header__right">
    <a (click)="navigateToGraph()" class="header__nav-link" title="Knowledge Graph">
      <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
        <circle cx="5" cy="5" r="2.5" fill="currentColor" opacity="0.7"/>
        <circle cx="15" cy="5" r="2.5" fill="currentColor" opacity="0.7"/>
        <circle cx="10" cy="15" r="2.5" fill="currentColor" opacity="0.7"/>
        <line x1="5" y1="5" x2="15" y2="5" stroke="currentColor" stroke-width="1" opacity="0.4"/>
        <line x1="5" y1="5" x2="10" y2="15" stroke="currentColor" stroke-width="1" opacity="0.4"/>
        <line x1="15" y1="5" x2="10" y2="15" stroke="currentColor" stroke-width="1" opacity="0.4"/>
      </svg>
    </a>
    <a href="https://github.com/mhylle/secondbrain" target="_blank" rel="noopener" class="header__github-link" aria-label="GitHub repository">
      <svg width="20" height="20" viewBox="0 0 16 16" fill="currentColor">
